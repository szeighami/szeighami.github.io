<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.name }}</title>
  <meta name="description" content="Sepanta Zeighami — Postdoctoral Scholar at UC Berkeley. Research on data and AI systems.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-text: #1a1a1a;
      --color-muted: #5a5a5a;
      --color-soft: #8a8a8a;
      --color-accent: #2d5d50;
      --color-accent-hover: #1f4238;
      --color-highlight: #b54a3c;
      --color-rule: #e6e4df;
      --color-card: #faf9f6;
      --max-width: 880px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-serif: 'Source Serif 4', 'Georgia', serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: 16px;
      line-height: 1.65;
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a {
      color: var(--color-accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    a:hover {
      color: var(--color-accent-hover);
      border-bottom-color: var(--color-accent-hover);
    }

    /* Navigation */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: saturate(180%) blur(8px);
      -webkit-backdrop-filter: saturate(180%) blur(8px);
      border-bottom: 1px solid var(--color-rule);
    }
    .nav-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .nav-brand {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.01em;
      color: var(--color-text);
      border: none;
    }
    .nav-brand:hover { color: var(--color-accent); border: none; }
    .nav-links {
      display: flex;
      gap: 22px;
      font-size: 14px;
      font-weight: 500;
    }
    .nav-links a {
      color: var(--color-muted);
      border: none;
    }
    .nav-links a:hover { color: var(--color-accent); border: none; }

    /* Layout */
    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    /* Hero */
    .hero {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 40px;
      align-items: start;
      padding-bottom: 40px;
    }
    .hero-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .hero-photo {
      width: 220px;
      height: 220px;
      border-radius: 6px;
      object-fit: cover;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    }
    .hero-right { min-width: 0; }
    .hero-name {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 34px;
      line-height: 1.15;
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }
    .hero-role {
      font-size: 16px;
      color: var(--color-text);
      margin: 0 0 2px;
    }
    .hero-affil {
      color: var(--color-muted);
      margin: 0 0 8px;
    }
    .hero-email {
      font-size: 14px;
      margin: 4px 0 8px;
    }
    .hero-email a {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      color: var(--color-accent);
    }
    .hero-inline-links {
      font-size: 14px;
      margin: 0 0 18px;
      color: var(--color-muted);
    }
    .hero-inline-links .dot {
      color: var(--color-soft);
      margin: 0 6px;
    }
    .placeholder-link {
      color: var(--color-soft);
      font-style: italic;
    }

    /* Mentor block under photo */
    .hero-mentor {
      width: 220px;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--color-rule);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* About text under hero info */
    .hero-about { margin-top: 18px; }
    .hero-about p {
      margin: 10px 0;
      font-size: 15px;
      line-height: 1.6;
    }
    .hero-about p b { color: var(--color-text); }

    /* Sections */
    section {
      padding-top: 36px;
      scroll-margin-top: 70px;
    }
    .section-title {
      font-family: var(--font-serif);
      font-weight: 600;
      font-size: 22px;
      letter-spacing: -0.005em;
      margin: 0 0 4px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--color-rule);
      margin-left: 6px;
    }

    /* Bio prose */
    .prose p {
      margin: 14px 0;
      color: var(--color-text);
    }
    .prose p + p { margin-top: 12px; }

    /* Sub-section label, used inside About and Papers */
    .sub-label {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-soft);
      margin: 28px 0 10px;
    }
    .prose .sub-label:first-child { margin-top: 18px; }

    .placeholder-text {
      color: var(--color-soft);
      font-style: italic;
    }

    /* Mentor blocks (small, under photo) */
    .mentor-block { min-width: 0; }
    .mentor-label {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-soft);
      margin: 0 0 3px;
    }
    .mentor-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--color-muted);
    }
    .mentor-list a { font-size: 12.5px; }
    .mentor-placeholder {
      color: var(--color-soft);
      font-style: italic;
    }

    /* Papers blurb */
    .papers-blurb {
      color: var(--color-muted);
      margin: 14px 0 4px;
      font-size: 15px;
    }

    /* Publication list */
    .pub-list {
      list-style: none;
      padding: 0;
      margin: 14px 0 0;
    }
    .pub-list > li {
      padding: 9px 0;
      border-bottom: 1px solid var(--color-rule);
    }
    .pub-list > li:last-child { border-bottom: none; }

    .pub-title {
      font-weight: 600;
      font-size: 15.5px;
      line-height: 1.3;
      color: var(--color-text);
      border-bottom: 1px solid transparent;
    }
    .pub-title:hover {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
    }
    .pub-authors {
      display: block;
      margin-top: 2px;
      color: var(--color-muted);
      font-size: 14px;
      line-height: 1.35;
    }
    .pub-authors b, .pub-authors strong {
      color: var(--color-text);
      font-weight: 600;
    }
    .pub-venue {
      display: block;
      margin-top: 1px;
      font-style: italic;
      color: var(--color-soft);
      font-size: 13.5px;
    }
    .pub-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 10px;
      margin-top: 5px;
      align-items: center;
      font-size: 12.5px;
    }
    .pub-link {
      display: inline-flex;
      align-items: center;
      padding: 1px 8px;
      border-radius: 3px;
      background: var(--color-card);
      border: 1px solid var(--color-rule);
      color: var(--color-muted);
      font-weight: 500;
    }
    .pub-link:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }
    .pub-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px 8px;
      border-radius: 3px;
      background: rgba(181, 74, 60, 0.08);
      color: var(--color-highlight);
      font-weight: 600;
      letter-spacing: 0.01em;
      font-size: 11.5px;
    }
    .pub-icon {
      display: inline-block;
      font-size: 12px;
      line-height: 1;
    }
    .legend {
      font-size: 13px;
      color: var(--color-soft);
      margin-left: 4px;
    }
    .pub-note {
      color: var(--color-muted);
      font-size: 11.5px;
    }

    /* Footer */
    footer {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 32px 24px 48px;
      border-top: 1px solid var(--color-rule);
      color: var(--color-soft);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* Mobile */
    @media (max-width: 640px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 20px;
        text-align: left;
      }
      .hero-photo { width: 160px; height: 160px; }
      .hero-name { font-size: 28px; }
      .hero-mentor { width: 100%; }
      main { padding: 36px 20px 64px; }
      .nav-inner { padding: 12px 20px; }
      .nav-links { gap: 14px; font-size: 13px; }
      .nav-brand { font-size: 14px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="#top">Sepanta Zeighami</a>
      <div class="nav-links">
        <a href="#about">Home</a>
        <a href="#papers">Publications</a>
      </div>
    </div>
  </nav>
  <a id="top"></a>
  {{ content }}
  <footer>
    <span>&copy; Sepanta Zeighami</span>
    <span>Last updated 2026</span>
  </footer>
</body>
</html>
